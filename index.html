<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudOps Pro Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* BASE */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#0a0f1c;color:white;}

/* NAV */
nav{
display:flex;justify-content:space-between;align-items:center;
padding:18px 8%;background:rgba(255,255,255,0.04);
backdrop-filter:blur(10px);position:sticky;top:0;z-index:1000;
}

.logo{font-weight:800;color:#60a5fa;}
.nav-links{display:flex;gap:25px;list-style:none;}
.nav-links a{color:#cbd5e1;text-decoration:none;}
.menu{display:none;cursor:pointer;}

/* HERO */
.hero{
display:grid;grid-template-columns:1fr 1fr;
padding:90px 8%;align-items:center;gap:60px;
}

.hero h1{font-size:3rem;line-height:1.1;}
.hero p{color:#94a3b8;margin:20px 0;}

.badge{
display:inline-block;padding:8px 14px;
background:rgba(96,165,250,0.15);
color:#60a5fa;border-radius:30px;margin-bottom:15px;
}

.btn{
padding:12px 18px;border-radius:10px;
background:#3b82f6;color:white;
border:none;cursor:pointer;margin-right:10px;
}

.btn-danger{background:#ef4444;}
.btn-success{background:#22c55e;}
.btn-outline{background:transparent;border:1px solid #3b82f6;}

/* METRICS */
.section{padding:70px 8%;}
.metrics{
display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.metric{
background:rgba(255,255,255,0.05);
padding:25px;border-radius:15px;text-align:center;
}

.metric h2{color:#60a5fa;}

/* LOGS */
.logs{
background:#0f172a;padding:15px;border-radius:15px;
height:300px;overflow:auto;font-size:.85rem;
}

.log{margin:5px 0;color:#94a3b8;}

/* FILTER BAR */
.filters{
display:flex;gap:10px;margin-bottom:15px;
}

.filter-btn{
padding:8px 12px;
border-radius:8px;
border:1px solid #334155;
background:transparent;
color:white;
cursor:pointer;
}

/* CHART */
canvas{
background:rgba(255,255,255,0.03);
border-radius:15px;
}

/* TOAST */
.toast{
position:fixed;
bottom:20px;
right:20px;
background:#1f2937;
padding:12px 18px;
border-radius:10px;
display:none;
}

/* MOBILE */
@media(max-width:900px){
.hero{grid-template-columns:1fr;text-align:center;}
.nav-links{display:none;position:absolute;top:60px;width:100%;left:0;background:#0f172a;padding:20px;}
.nav-links.active{display:flex;flex-direction:column;}
.menu{display:block;}
}

</style>
</head>

<body>

<nav>
<div class="logo">CloudOps Pro</div>

<ul class="nav-links" id="nav">
<li><a href="#">Dashboard</a></li>
<li><a href="#">Deployments</a></li>
<li><a href="#">Logs</a></li>
<li><a href="#">Metrics</a></li>
</ul>

<div class="menu" onclick="toggleMenu()">☰</div>
</nav>

<!-- HERO -->
<section class="hero">

<div>
<span class="badge">AWS DevOps Control Center</span>

<h1>Monitor, Deploy & Control Cloud Infrastructure</h1>

<p>
Real-time EC2 monitoring, deployment automation,
and system observability dashboard.
</p>

<button class="btn btn-success" onclick="deploy()">Deploy</button>
<button class="btn btn-danger" onclick="stop()">Stop Instance</button>
<button class="btn btn-outline" onclick="toggleAuto()">Auto Refresh</button>
</div>

<div>
<canvas id="chart" height="220"></canvas>
</div>

</section>

<!-- METRICS -->
<section class="section">

<div class="metrics">

<div class="metric">
<h2 id="cpu">12%</h2>
<p>CPU</p>
</div>

<div class="metric">
<h2 id="ram">45%</h2>
<p>Memory</p>
</div>

<div class="metric">
<h2 id="req">120</h2>
<p>Requests</p>
</div>

<div class="metric">
<h2 id="uptime">0h 0m</h2>
<p>Uptime</p>
</div>

</div>

</section>

<!-- LOGS -->
<section class="section">

<div class="filters">
<button class="filter-btn" onclick="filterLogs('all')">All</button>
<button class="filter-btn" onclick="filterLogs('info')">Info</button>
<button class="filter-btn" onclick="filterLogs('warn')">Warn</button>
<button class="filter-btn" onclick="filterLogs('error')">Error</button>
</div>

<div class="logs" id="logs"></div>

</section>

<div class="toast" id="toast"></div>

<script>

/* MENU */
function toggleMenu(){
document.getElementById("nav").classList.toggle("active");
}

/* AUTO REFRESH */
let auto = true;
function toggleAuto(){
auto = !auto;
showToast("Auto refresh: " + auto);
}

/* DEPLOY */
function deploy(){
showToast("Deploying application...");
addLog("info","Deployment started");
setTimeout(()=>{
addLog("info","Deployment successful");
showToast("Deployment completed");
},2000);
}

/* STOP INSTANCE */
function stop(){
showToast("Instance stopped");
addLog("error","EC2 instance stopped");
}

/* LOG SYSTEM */
function addLog(type,msg){
const div = document.createElement("div");
div.className="log";
div.dataset.type=type;
div.innerText=`[${type.toUpperCase()}] ${msg}`;
document.getElementById("logs").prepend(div);
}

/* FILTER LOGS */
function filterLogs(type){
document.querySelectorAll(".log").forEach(l=>{
l.style.display = (type==="all"||l.dataset.type===type)?"block":"none";
});
}

/* TOAST */
function showToast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* METRICS + UPTIME */
let seconds = 0;

setInterval(()=>{
if(!auto) return;

document.getElementById("cpu").innerText = Math.floor(Math.random()*50+10)+"%";
document.getElementById("ram").innerText = Math.floor(Math.random()*60+20)+"%";
document.getElementById("req").innerText = Math.floor(Math.random()*200+50);

seconds++;
let h = Math.floor(seconds/3600);
let m = Math.floor((seconds%3600)/60);
document.getElementById("uptime").innerText = `${h}h ${m}m`;

addLog("info","Health check OK");

},4000);

/* CHART */
const canvas=document.getElementById("chart");
const ctx=canvas.getContext("2d");

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.strokeStyle="#3b82f6";
ctx.beginPath();

let x=0;
for(let i=0;i<20;i++){
let y=Math.sin(i/2 + Date.now()/500)*30+100;
ctx.lineTo(x,y);
x+=20;
}

ctx.stroke();
}

setInterval(draw,1000);
draw();

</script>

</body>
</html>
