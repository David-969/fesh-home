<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudOps Enterprise Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ===================== GLOBAL ===================== */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#070b14;color:#fff;}

/* ===================== LAYOUT ===================== */
.container{
    display:grid;
    grid-template-columns:260px 1fr;
    min-height:100vh;
}

/* ===================== SIDEBAR ===================== */
.sidebar{
    background:#0f172a;
    padding:20px;
}

.sidebar h2{
    color:#60a5fa;
    margin-bottom:20px;
}

.sidebar button{
    width:100%;
    margin:8px 0;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#1e293b;
    color:#fff;
    cursor:pointer;
}

.sidebar button:hover{
    background:#3b82f6;
}

/* ===================== MAIN ===================== */
.main{
    padding:25px;
}

/* TOP BAR */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.badge{
    background:#1d4ed8;
    padding:6px 12px;
    border-radius:20px;
    font-size:.8rem;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:15px;
}

/* CARDS */
.card{
    background:#0f172a;
    padding:18px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.05);
}

.card h3{color:#60a5fa;margin-bottom:10px;}

/* STATUS BARS */
.bar{
    height:8px;
    background:#1e293b;
    border-radius:10px;
    overflow:hidden;
}

.fill{
    height:100%;
    background:#3b82f6;
}

/* LOGS */
.logs{
    margin-top:20px;
    background:#0f172a;
    padding:15px;
    border-radius:12px;
    height:250px;
    overflow:auto;
    font-size:.85rem;
}

.log{margin:5px 0;color:#94a3b8;}

/* INCIDENTS */
.alert{
    background:#7f1d1d;
    padding:10px;
    border-radius:10px;
    margin:5px 0;
}

/* TIMELINE */
.timeline{
    margin-top:20px;
    background:#0f172a;
    padding:15px;
    border-radius:12px;
}

.event{
    border-left:3px solid #3b82f6;
    padding-left:10px;
    margin:10px 0;
    color:#cbd5e1;
}

/* BUTTONS */
.btn{
    padding:8px 14px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    margin-right:5px;
}

.green{background:#16a34a;color:#fff;}
.red{background:#ef4444;color:#fff;}
.blue{background:#3b82f6;color:#fff;}

</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
<h2>CloudOps</h2>

<button onclick="startEC2()">Start EC2</button>
<button onclick="stopEC2()">Stop EC2</button>
<button onclick="restartEC2()">Restart</button>
<button onclick="deploy()">Deploy App</button>
<button onclick="generateAlert()">Trigger Alert</button>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
<h2>Enterprise Dashboard</h2>
<span class="badge" id="role">ROLE: ADMIN</span>
</div>

<!-- METRICS -->
<div class="grid">

<div class="card">
<h3>EC2 CPU</h3>
<p id="cpu">22%</p>
<div class="bar"><div class="fill" id="cpuBar" style="width:22%"></div></div>
</div>

<div class="card">
<h3>Memory</h3>
<p id="ram">55%</p>
<div class="bar"><div class="fill" id="ramBar" style="width:55%"></div></div>
</div>

<div class="card">
<h3>Network</h3>
<p id="net">120 Mbps</p>
</div>

<div class="card">
<h3>Status</h3>
<p id="status">RUNNING</p>
</div>

</div>

<!-- INCIDENTS -->
<h3 style="margin-top:20px;">🚨 Alerts</h3>
<div id="alerts"></div>

<!-- LOGS -->
<h3 style="margin-top:20px;">Logs</h3>
<div class="logs" id="logs"></div>

<!-- DEPLOYMENT TIMELINE -->
<h3 style="margin-top:20px;">Deployment History</h3>
<div class="timeline" id="timeline"></div>

</div>
</div>

<script>

/* ===================== EC2 SIMULATION ===================== */
function startEC2(){
updateStatus("RUNNING","green");
log("EC2 started");
}

function stopEC2(){
updateStatus("STOPPED","red");
log("EC2 stopped");
}

function restartEC2(){
updateStatus("RESTARTING","blue");
log("EC2 restarting...");
setTimeout(()=>updateStatus("RUNNING","green"),2000);
}

function updateStatus(text,color){
document.getElementById("status").innerText=text;
}

/* ===================== DEPLOY ===================== */
function deploy(){
log("Deployment started...");
addTimeline("App deployed successfully");
setTimeout(()=>log("Deployment completed"),1500);
}

/* ===================== ALERTS ===================== */
function generateAlert(){
const div=document.createElement("div");
div.className="alert";
div.innerText="High CPU usage detected on EC2!";
document.getElementById("alerts").prepend(div);
}

/* ===================== LOGS ===================== */
function log(msg){
const div=document.createElement("div");
div.className="log";
div.innerText="[INFO] "+msg;
document.getElementById("logs").prepend(div);
}

/* ===================== TIMELINE ===================== */
function addTimeline(msg){
const div=document.createElement("div");
div.className="event";
div.innerText=new Date().toLocaleTimeString()+" - "+msg;
document.getElementById("timeline").prepend(div);
}

/* ===================== METRICS LOOP ===================== */
setInterval(()=>{

let cpu=Math.floor(Math.random()*70+10);
let ram=Math.floor(Math.random()*80+10);

document.getElementById("cpu").innerText=cpu+"%";
document.getElementById("ram").innerText=ram+"%";

document.getElementById("cpuBar").style.width=cpu+"%";
document.getElementById("ramBar").style.width=ram+"%";

},3000);

</script>

</body>
</html>
